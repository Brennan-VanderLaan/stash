[pytest]
# Surface slow tests on every run so a hot-spot creep gets caught
# immediately, not "weeks later when the suite is 8 minutes".
#
# --durations=25         — list the 25 slowest tests (setup +
#                          call + teardown summed) at the end.
# --durations-min=0.25   — hide anything under 250 ms so the report
#                          stays scannable on a fast suite.
# -n auto                — pytest-xdist parallel runner, one worker
#                          per logical CPU.  Tests are largely
#                          isolated (each gets its own ``tmp_path``-
#                          backed SQLite DB + a fresh app module
#                          via ``del sys.modules['app']`` +
#                          ``importlib.reload``) so the speedup is
#                          near-linear in core count: 5-6× on a
#                          modern 16-core dev box.
# --dist=loadscope       — keep tests from the same module on the
#                          same worker.  Critical for the UI suite
#                          (one uvicorn session-fixture boot per
#                          worker) and a small win elsewhere
#                          (module-level setup amortised).
#
# Disable parallel for a single run with ``pytest -n0`` (handy when
# debugging with pdb — xdist intercepts stdout in worker
# subprocesses so breakpoints get awkward).
addopts = --durations=25 --durations-min=0.25 -n auto --dist=loadscope

# Markers — explicit registry so ``pytest -m "not ui"`` works without
# the "unknown mark" warning.
#
# ``ui``  — Playwright-driven browser tests under tests/ui/.  Need
#           ``pip install -r requirements-dev.txt`` +
#           ``playwright install chromium``.  Spawns uvicorn against
#           a temp DB per session and clicks through real pages.
#           Skip with ``pytest -m "not ui"`` for the fast feedback
#           loop.
markers =
    ui: browser-driven regression test (Playwright)

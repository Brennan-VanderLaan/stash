[pytest]
# Surface slow tests on every run so a hot-spot creep gets caught
# immediately, not "weeks later when the suite is 8 minutes".
#
# --durations=25         — list the 25 slowest tests (setup +
#                          call + teardown summed) at the end.
# --durations-min=0.25   — hide anything under 250 ms so the report
#                          stays scannable on a fast suite.
addopts = --durations=25 --durations-min=0.25

# Markers — explicit registry so ``pytest -m "not ui"`` works without
# the "unknown mark" warning.
#
# ``ui``  — Playwright-driven browser tests under tests/ui/.  Need
#           ``pip install -r requirements-dev.txt`` +
#           ``playwright install chromium``.  Spawns uvicorn against
#           a temp DB per session and clicks through real pages.
#           Skip with ``pytest -m "not ui"`` for the fast feedback
#           loop.
markers =
    ui: browser-driven regression test (Playwright)

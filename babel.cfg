# Babel extraction config for the gettext message catalog.
#
# Usage (when adding a new locale, e.g. Spanish):
#
#   pybabel extract -F babel.cfg -o locale/messages.pot .
#   pybabel init -i locale/messages.pot -d locale -l es
#   # ... translate locale/es/LC_MESSAGES/messages.po ...
#   pybabel compile -d locale
#
# After `compile`, swap _translations in app.py from NullTranslations()
# to gettext.translation("messages", "locale", languages=[...]).
#
# v1 ships English-only, so the .pot file isn't checked in yet — just
# the config so the workflow is one command away when needed.

[python: **.py]
[jinja2: **/templates/**.html]
extensions=jinja2.ext.i18n

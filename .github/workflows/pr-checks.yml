name: pr-checks
# Fast in-process test pass on every PR.  Goal: <60 s feedback so
# a contributor doesn't have to context-switch waiting for green.
# Heavier Playwright UI suite + the full pytest run live in
# main-tests.yml and only fire when the merge target is main.
#
# NOT triggered on push.  Direct ``dev`` pushes are gated by
# build.yml's own fast-test job before the image goes out — see
# the "Test gate (asymmetric, by design)" comment block there.
# Running pr-checks on the same push would double-bill the suite.

on:
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  fast-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      # Fast pass: every test except the Playwright-driven UI suite
      # (which is gated to ``-m "not ui"`` via pytest.ini's marker
      # config).  xdist-parallel via the project pytest.ini default.
      - name: Run unit + integration tests
        run: pytest -m "not ui" --tb=short

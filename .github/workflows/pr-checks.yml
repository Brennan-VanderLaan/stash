name: pr-checks
# Fast in-process test pass on feature PRs.  Goal: <60 s feedback
# so a contributor doesn't have to context-switch waiting for
# green.  Heavier Playwright UI suite lives in release-tests.yml
# and only fires on release-please's Release PR.
#
# NOT triggered on push.  Direct ``dev`` pushes are gated by
# build.yml's own fast-test job before the image goes out — see
# the "Test gate (asymmetric, by design)" comment block there.
# Running pr-checks on the same push would double-bill the suite.
#
# Release PRs (head ``release-please--*``) are skipped because
# release-tests.yml runs the full suite on them — a fast subset
# on top would be pure duplication.

on:
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  fast-tests:
    if: ${{ !startsWith(github.head_ref, 'release-please--') }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      # Fast pass: every test except the Playwright-driven UI suite
      # (which is gated to ``-m "not ui"`` via pytest.ini's marker
      # config).  xdist-parallel via the project pytest.ini default.
      - name: Run unit + integration tests
        run: pytest -m "not ui" --tb=short

name: main-sync
# When a v*.*.* tag is created (which only happens when the
# rolling Release PR on dev merges, per the new release-please
# config), this workflow:
#
#   1. Fast-forwards ``main`` to the tagged commit, so main
#      always reflects the latest released code.
#   2. POSTs to prod's ``/api/v1/admin/redeploy`` webhook so
#      watchtower on prod pulls the new image.
#
# Why both steps in one workflow (not "ff main on tag, then
# prod-redeploy on push: main"): a push using GITHUB_TOKEN
# deliberately doesn't trigger downstream workflows.  Chaining
# would require a PAT just so the main push fires prod-redeploy.
# One workflow with both steps avoids that and keeps the
# "tag → main → prod" promotion atomic.
#
# Prod-side prerequisites (one-time):
#   * STASH_IMAGE on prod pinned to a tag that moves with releases:
#     - ``:1``       — track any 1.x.y (auto-applies minors + patches)
#     - ``:1.49``    — track only 1.49.x patches (no minor auto-bump)
#     - ``:v1.49.0`` — frozen; webhook is a no-op
#   * GHA secrets:
#     - PROD_REDEPLOY_URL    e.g. https://stash.swampcats.life/api/v1/admin/redeploy
#     - PROD_REDEPLOY_TOKEN  bearer minted on prod by an operator account
#   * main branch protection must allow github-actions[bot] to
#     push (Settings → Branches → Branch protection rules → main
#     → "Restrict who can push" allowlist), OR main protection
#     can be removed entirely since release decisions don't
#     happen there anymore.

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      # Webhook fires FIRST.  Image is already in GHCR at this
      # point (build.yml runs in parallel and is fast enough); the
      # webhook tells prod's watchtower to re-check the pinned tag.
      # Putting this step before the main-ff step decouples the
      # two — a FF failure (e.g. main diverged) doesn't block the
      # prod redeploy.
      #
      # Missing/empty secret skips cleanly (warning only).
      # ``continue-on-error: true`` because the image is already
      # built; a transient webhook failure shouldn't tank the
      # workflow.  Operator can hit "Check for updates" on
      # /admin/maintenance to catch up if needed.
      - name: Trigger prod redeploy
        continue-on-error: true
        env:
          URL: ${{ secrets.PROD_REDEPLOY_URL }}
          TOKEN: ${{ secrets.PROD_REDEPLOY_TOKEN }}
        run: |
          if [ -z "$URL" ] || [ -z "$TOKEN" ]; then
            echo "::warning::PROD_REDEPLOY_URL or PROD_REDEPLOY_TOKEN not set — skipping webhook"
            exit 0
          fi
          curl -fsSL --max-time 30 -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            "$URL"

      # Best-effort: fast-forward main to the tagged commit so
      # "main" reflects the latest released code.  Fails benignly
      # if main has diverged (e.g. one-time bootstrap mismatch
      # where merge commits landed on main but not dev) — in that
      # case the webhook above has already done the load-bearing
      # work.  Operator can manually align main when convenient
      # by force-pushing dev to main (after temporarily dropping
      # the non_fast_forward rule).
      - name: Fast-forward main to tagged commit
        continue-on-error: true
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if git push origin ${{ github.sha }}:refs/heads/main; then
            echo "main is now at $(git rev-parse --short ${{ github.sha }})"
          else
            echo "::warning::Could not fast-forward main to ${{ github.sha }} — main has diverged.  See main-sync.yml comments for one-time realignment."
          fi

name: main-sync
# When a v*.*.* tag is created (which only happens when the
# rolling Release PR on dev merges, per the release-please
# config), this workflow fast-forwards ``main`` to the tagged
# commit so main always reflects the latest released code.
#
# The prod redeploy webhook used to live here too, but it had a
# race: this workflow fires immediately on the tag push, before
# build.yml has finished pushing the new image to GHCR.
# Watchtower would re-check ``:1`` and see no new digest, so the
# redeploy silently no-op'd.  The webhook moved into build.yml's
# post-push step where it's guaranteed to fire AFTER the image
# is actually in the registry.
#
# Prerequisites (one-time):
#   * main branch protection must allow github-actions[bot] to
#     push.  Achieved by dropping the ``pull_request`` rule from
#     the "Protect Main" ruleset — see CICD.md.
#   * dev must be linearly ahead of main (i.e., main must be an
#     ancestor of dev).  Verify with:
#       git merge-base --is-ancestor origin/main origin/dev
#     If this returns non-zero, fast-forward dev to main first:
#       git checkout dev && git merge --ff-only origin/main && git push

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      # Fast-forward main to the tagged commit so it reflects
      # the latest released code.  ``continue-on-error: true``
      # means a diverged-main warns rather than fails the
      # workflow — prod's redeploy webhook is independent
      # (lives in build.yml after the image push) and doesn't
      # depend on this step succeeding.
      - name: Fast-forward main to tagged commit
        continue-on-error: true
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if git push origin ${{ github.sha }}:refs/heads/main; then
            echo "main is now at $(git rev-parse --short ${{ github.sha }})"
          else
            echo "::warning::Could not fast-forward main to ${{ github.sha }} — main has diverged.  See main-sync.yml comments for one-time realignment."
          fi

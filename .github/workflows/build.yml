name: build
# Build the production container image and push to GHCR.
#
# Two trigger paths:
#
# 1. ``push: dev``        → image tagged ``:dev`` (floating) AND
#                           ``:dev-<short-sha>`` (immutable history).
#                           Watchtower on stash-staging polls ``:dev``
#                           and auto-pulls.  This is the "staging
#                           always tracks dev tip" pipe.
#
# 2. ``push: tags v*.*.*`` → image tagged ``:vX.Y.Z``, ``:X.Y``, ``:X``.
#                            NO ``:latest`` — production pins to an
#                            explicit version in its compose env so
#                            "what's running" is greppable and a
#                            release is a deliberate operator action.
#                            Tags are pushed automatically by
#                            release-please when its Release PR lands
#                            on main.
#
# No build runs on push to main itself.  Main pushes go through
# release-please.yml, which opens a Release PR; merging that PR
# creates the version tag, and that tag firing this workflow is the
# canonical "production image is ready" signal.
#
# Test gate (asymmetric, by design):
#   * Dev pushes        → fast (non-UI) suite runs as a gate.  This
#                         catches direct dev pushes that bypass the
#                         PR-checks workflow.
#   * Version tag pushes → no gate.  The only way to land code on
#                         main is a PR that ran the full Playwright
#                         suite (main-tests.yml), so the code under
#                         the tag is already known-good.  Re-testing
#                         here would just delay the production
#                         image.  Speed wins.

on:
  push:
    branches: [dev]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Gate (dev pushes only) ────────────────────────────────────────
  # Run the fast in-process suite before pushing a :dev image.  Pure
  # belt-and-suspenders — direct pushes to dev (no PR) skip
  # pr-checks.yml, so this is the only gate keeping a broken commit
  # off staging in that case.  If pr-checks already ran on a dev-
  # base PR, this re-run is redundant but cheap (~30 s).
  #
  # Skipped on TAG pushes.  Tags only get created when release-
  # please's Release PR merges to main, and that merge was already
  # gated by main-tests.yml (full suite incl. Playwright UI) on the
  # dev → main PR.  Re-running fast tests at the tag stage would
  # just delay the production image without catching anything new.
  test:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run fast tests
        run: pytest -m "not ui" --tb=short

  # ── Image build ───────────────────────────────────────────────────
  # On dev pushes: needs the test gate above (runs after test passes).
  # On tag pushes: ``test`` is skipped per its ``if``.  GHA's
  # DEFAULT behaviour with ``needs:`` is "skipped dependency →
  # skipped job", which would silently kill the production build.
  # The explicit ``if:`` below overrides that: build runs when
  # test succeeded OR test was skipped.  ``!cancelled()`` makes
  # sure a workflow-level cancel still stops everything cleanly.
  build:
    needs: test
    if: ${{ !cancelled() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 so git history + tags are present.  The
      # pending-changelog step below walks ``git log <last-tag>..HEAD``
      # — a shallow checkout would have neither tags nor enough
      # commits for the walk to be meaningful.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from release-please manifest
        id: version
        run: echo "version=$(jq -r '."."' .release-please-manifest.json)" >> "$GITHUB_OUTPUT"

      # ── Pending-release preview (dev pushes only) ─────────────────
      # Walks conventional-commit history from the most recent
      # vX.Y.Z tag to HEAD, predicts the next semver bump, and
      # writes a markdown block.  Prepends that block to
      # CHANGELOG.md *inside the build context* so the resulting
      # :dev image surfaces "if you released right now, this is
      # what would ship" on /admin/maintenance.
      #
      # The predicted version overrides the manifest version for
      # the VERSION build-arg, so staging displays e.g.
      # ``1.49.0-dev.b0220ad`` instead of the released ``1.48.0``.
      #
      # Tag-triggered builds skip this entire step.  Those ship
      # the canonical release-please CHANGELOG.md + manifest
      # version unchanged.
      - name: Compute pending-release preview
        if: github.ref == 'refs/heads/dev'
        id: pending
        run: |
          python3 tools/pending_changelog.py > /tmp/pending.json
          echo "version=$(jq -r .version /tmp/pending.json)" >> "$GITHUB_OUTPUT"
          jq -r .markdown /tmp/pending.json > /tmp/pending.md
          # Prepend the pending section to CHANGELOG.md.  The build
          # context picks up the modified file via the COPY in the
          # Dockerfile, so the running container reads it on boot
          # like any other release.
          cat /tmp/pending.md CHANGELOG.md > /tmp/CHANGELOG.combined
          mv /tmp/CHANGELOG.combined CHANGELOG.md
          echo "::group::Pending changelog preview"
          cat /tmp/pending.md
          echo "::endgroup::"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR refuses uppercase repo names. github.repository preserves the
      # owner's case, so lowercase it once and reuse for tags + cache refs.
      - name: Lowercase image name
        id: img
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      # Tag strategy:
      #
      # dev branch push:
      #   :dev               (floating — watchtower target on staging)
      #   :dev-sha-abc1234   (immutable — for rollback / forensics)
      #
      # Version tag push (v1.42.0):
      #   :v1.42.0           (exact version)
      #   :1.42              (minor pin)
      #   :1                 (major pin)
      #   NO :latest         (intentional — see workflow header)
      #
      # Conditions on each ``type=`` line use the same syntax as
      # docker/metadata-action: ``enable={{is_branch_X}}`` returns
      # the matched ref so the tag is emitted only when its trigger
      # actually fired.
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}
          tags: |
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=sha,prefix=dev-sha-,format=short,enable=${{ github.ref == 'refs/heads/dev' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Dev pushes pass the predicted "next release" version
          # (``1.49.0-dev.<sha>``).  Tag pushes fall through to the
          # release-please manifest version (``1.49.0``).  The
          # ``steps.pending.outputs.version`` expression evaluates
          # to empty string when the pending step was skipped
          # (non-dev refs), so the ``||`` picks the manifest
          # value as the fallback.
          build-args: |
            VERSION=${{ steps.pending.outputs.version || steps.version.outputs.version }}
            GIT_SHA=${{ github.sha }}
          # Layered cache: GHA cache (fast, free, 10 GB LRU) +
          # GHCR registry cache (persistent, no eviction).
          cache-from: |
            type=gha
            type=registry,ref=${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:cache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:cache,mode=max

      # ── Notify staging ────────────────────────────────────────────
      # Event-driven redeploy: after the :dev image lands in GHCR,
      # POST to staging's operator-only ``/api/v1/admin/redeploy``
      # endpoint with a bearer token.  That endpoint background-
      # triggers watchtower's HTTP API to pull + recreate the stash
      # container.  End-to-end latency from "git push origin dev"
      # to "running on staging" drops from ~5-8 min (poll-driven)
      # to ~30-60 s after this step completes.
      #
      # Tag-triggered builds (production releases) intentionally
      # do NOT hit this hook — production cutover is a deliberate
      # operator action via the in-app /admin/maintenance button.
      #
      # ``continue-on-error: true`` because the image is already
      # published at this point; if staging is down or the secret
      # is mid-rotation we don't want to fail an otherwise-green
      # build.  Watchtower's periodic-poll fallback (if enabled
      # on staging's .env as belt-and-suspenders) will catch up
      # within its interval anyway.
      #
      # Secrets required (Settings → Secrets and variables → Actions):
      #   STAGING_REDEPLOY_URL    — full URL incl. /api/v1/admin/redeploy
      #   STAGING_REDEPLOY_TOKEN  — bearer minted on the staging stash
      #                             from an operator email account
      - name: Trigger staging redeploy
        if: github.ref == 'refs/heads/dev'
        continue-on-error: true
        env:
          URL: ${{ secrets.STAGING_REDEPLOY_URL }}
          TOKEN: ${{ secrets.STAGING_REDEPLOY_TOKEN }}
        run: |
          if [ -z "$URL" ] || [ -z "$TOKEN" ]; then
            echo "::warning::STAGING_REDEPLOY_URL or STAGING_REDEPLOY_TOKEN not set — skipping webhook"
            exit 0
          fi
          curl -fsSL --max-time 30 -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            "$URL"

services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - frontend
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    container_name: oauth2-proxy
    restart: unless-stopped
    networks:
      - frontend
      - backend
    environment:
      OAUTH2_PROXY_PROVIDER: google
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_REDIRECT_URL: https://${DOMAIN}/oauth2/callback
      OAUTH2_PROXY_UPSTREAMS: http://stash:8000
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      # Cookie hardening — explicit so a future default change can't silently
      # weaken the session.
      OAUTH2_PROXY_COOKIE_SECURE: "true"      # only sent over HTTPS
      OAUTH2_PROXY_COOKIE_HTTPONLY: "true"    # not readable from JS
      # Strict prevents the session cookie from being sent on *any*
      # cross-site navigation, not just form POSTs (Lax already
      # covers form POST CSRF on modern browsers, but Strict closes
      # the GET-then-redirect-to-POST chain too).  Tradeoff: the
      # first stash visit from an external link in a session needs
      # one extra round trip through OAuth — acceptable for a
      # personal-stash deployment with no public landing pages.
      OAUTH2_PROXY_COOKIE_SAMESITE: strict
      OAUTH2_PROXY_COOKIE_DOMAINS: ${DOMAIN}
      OAUTH2_PROXY_WHITELIST_DOMAINS: ${DOMAIN}
      # Re-validate the session against Google every 1h so a revoked Google
      # account stops working within the hour, not at full cookie expiry.
      OAUTH2_PROXY_COOKIE_REFRESH: 1h
      # ── DO NOT set OAUTH2_PROXY_EMAIL_DOMAINS here ───────────────────────
      # oauth2-proxy's email check is OR semantics: an email passes if it
      # matches the domain list *or* the authenticated-emails-file. Setting
      # `--email-domain *` therefore bypasses emails.txt entirely and lets
      # every Google identity in. The file alone is the gate; leave the
      # domain list unset so the only path through is an explicit listing.
      OAUTH2_PROXY_AUTHENTICATED_EMAILS_FILE: /etc/oauth2-proxy/emails.txt
      # Skip-auth routes — paths that must reach stash *without* a
      # Google session cookie because the caller authenticates a
      # different way:
      # * ``^/api/v1/`` — bearer-token API for scripted clients (phase 11).
      # * ``^/mcp$``   — Model Context Protocol endpoint (phase 18); bearer.
      # * ``^/oauth/(token|register)$`` — server-to-server OAuth endpoints
      #   (phase 19).  /authorize is browser-driven and stays gated.
      # * ``^/\.well-known/oauth-`` — RFC 8414 + 9728 discovery; public.
      # * ``^/healthz$`` — container liveness probe.
      # Each of these is also gated at the stash layer (current_actor
      # middleware) — this list just lets the request through the
      # outer Google-cookie wall.
      OAUTH2_PROXY_SKIP_AUTH_ROUTES: |-
        ^/api/v1/
        ^/mcp$
        ^/oauth/token$
        ^/oauth/register$
        ^/\.well-known/oauth-
        ^/healthz$
      # Pass useful headers to stash (X-Forwarded-User / X-Forwarded-Email).
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      # Skip the "click to sign in" interstitial — go straight to Google.
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      # Default upstream timeout is 30s, which kills multi-hundred-MB backup
      # restores mid-stream with "context canceled". Bump generously — the
      # only long upload path is /maintenance/import, gated by Caddy's 2GB cap.
      OAUTH2_PROXY_UPSTREAM_TIMEOUT: 30m
    volumes:
      - ./emails.txt:/etc/oauth2-proxy/emails.txt:ro
    depends_on:
      - stash
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  stash:
    image: ${STASH_IMAGE:-ghcr.io/brennan-vanderlaan/stash:latest}
    container_name: stash
    restart: unless-stopped
    pull_policy: always
    env_file:
      - .env
    environment:
      # Used to build the URL encoded into printed-label QR codes.
      STASH_PUBLIC_URL: https://${DOMAIN}
      WATCHTOWER_URL: http://watchtower:8080
      WATCHTOWER_TOKEN: ${WATCHTOWER_TOKEN}
      # Encryption at rest.  Required — stash refuses to boot without it.
      # Wraps every tenant's DEK; back the value up separately from the
      # data backups (see .env for generation + caveats).
      STASH_KEK: ${STASH_KEK}
      # Multi-tenancy gates. The proxy's emails.txt is the first layer; the
      # tenant_members table (seeded from STASH_BOOTSTRAP_MEMBER_EMAIL on
      # first migration, or the legacy STASH_ALLOWED_EMAILS fallback) is
      # the second.  Operators get /admin via STASH_OPERATOR_EMAILS but
      # cannot read tenant data through that route by design.
      STASH_BOOTSTRAP_MEMBER_EMAIL: ${STASH_BOOTSTRAP_MEMBER_EMAIL}
      STASH_OPERATOR_EMAILS: ${STASH_OPERATOR_EMAILS}
      STASH_ALLOWED_EMAILS: ${STASH_ALLOWED_EMAILS}
      # Off-site backup target (Backblaze B2, S3-compatible API).  When
      # unset the /admin "Upload to B2" button is hidden; the in-app
      # /usage/backup download still works.  See .env.example for the
      # generate-credentials walk-through and the hard rule about the
      # KEK living in a separate bucket from the data.
      B2_KEY_ID: ${B2_KEY_ID:-}
      B2_APPLICATION_KEY: ${B2_APPLICATION_KEY:-}
      B2_ENDPOINT: ${B2_ENDPOINT:-}
      B2_BUCKET: ${B2_BUCKET:-}
    volumes:
      - stash-data:/data
    networks:
      - backend
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  # Tightly-scoped proxy in front of /var/run/docker.sock. Watchtower talks
  # to this over a private network instead of mounting the socket directly,
  # so a watchtower compromise (or a 0-day in any image it pulls) doesn't
  # automatically equal root on the host. Only the API endpoints watchtower
  # actually needs are exposed.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: docker-socket-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1   # list / inspect / create / start / stop / restart
      IMAGES: 1       # list / inspect / pull
      NETWORKS: 1     # required so recreated containers rejoin the right nets
      POST: 1         # allow the POST verbs above
      DELETE: 1       # for WATCHTOWER_CLEANUP=true
      # Read-only metadata endpoints. Without these, the Docker client can't
      # negotiate an API version and falls back to 1.25 — newer daemons reject
      # that with "client version 1.25 is too old".
      PING: 1
      VERSION: 1
      # Not enabled: EXEC, VOLUMES, SWARM, SECRETS, SERVICES, TASKS, NODES,
      # CONFIGS, BUILD, COMMIT, INFO, AUTH, SESSION, SYSTEM, PLUGINS.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - docker-control
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    networks:
      - backend
      - docker-control
    environment:
      # Talk to the proxy, not the host's docker socket.
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      # Pin the Docker API version. Without this, the Docker client SDK in
      # watchtower defaults to v1.25 and modern dockerd rejects it with
      # "client version 1.25 is too old. Minimum supported API version is 1.40".
      # 1.45 ships with Docker 25+; bump if you run a newer daemon that drops it.
      DOCKER_API_VERSION: "1.45"
      # Only act on containers explicitly opted-in via the label above.
      WATCHTOWER_LABEL_ENABLE: "true"
      # Disable the scheduled poll; updates are driven on-demand from the
      # app's Maintenance page via the HTTP API.
      WATCHTOWER_HTTP_API_UPDATE: "true"
      WATCHTOWER_HTTP_API_PERIODIC_POLLS: "false"
      WATCHTOWER_HTTP_API_TOKEN: ${WATCHTOWER_TOKEN}
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_RESTARTING: "true"
    # No docker.sock mount — talks to the proxy over the network instead.
    # If you push to a private GHCR image, mount a docker config with creds:
    # volumes:
    #   - ${HOME}/.docker/config.json:/config.json:ro

volumes:
  stash-data:
  caddy-data:
  caddy-config:

networks:
  # Public-facing leg: only caddy + oauth2-proxy live here. Caddy is the
  # only container with published ports.
  frontend:
  # Private leg: stash and watchtower are unreachable from the internet
  # AND from any future container that doesn't explicitly join `backend`.
  # oauth2-proxy bridges the two networks — it's the only path in.
  backend:
  # Even more private: only watchtower and docker-socket-proxy live here.
  # `internal: true` strips the network of internet routing entirely — the
  # proxy doesn't need it, and it shrinks blast-radius if either container
  # is ever compromised.
  docker-control:
    internal: true

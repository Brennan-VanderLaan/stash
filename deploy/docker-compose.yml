services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - frontend
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    container_name: oauth2-proxy
    restart: unless-stopped
    networks:
      - frontend
      - backend
    environment:
      OAUTH2_PROXY_PROVIDER: google
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_REDIRECT_URL: https://${DOMAIN}/oauth2/callback
      OAUTH2_PROXY_UPSTREAMS: http://stash:8000
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      # Cookie hardening — explicit so a future default change can't silently
      # weaken the session.
      OAUTH2_PROXY_COOKIE_SECURE: "true"      # only sent over HTTPS
      OAUTH2_PROXY_COOKIE_HTTPONLY: "true"    # not readable from JS
      # SameSite=Lax — required for the Google OAuth callback to
      # work.  The CSRF cookie oauth2-proxy sets at sign-in start
      # (``_oauth2_proxy_csrf``) has to survive Google's
      # cross-site redirect back to ``/oauth2/callback``;
      # SameSite=Strict drops it on cross-origin GET, which
      # 403s the callback with "CSRF cookie was not found".
      #
      # Lax is still real CSRF protection on modern browsers —
      # cross-origin form POSTs are blocked even with Lax (Chrome
      # 80+, Firefox 96+, Safari).  Phase 16 originally tightened
      # to Strict on the basis that "stash has no public landing
      # pages" — that stopped being true the moment we shipped
      # phase 19's OAuth callback.
      OAUTH2_PROXY_COOKIE_SAMESITE: lax
      OAUTH2_PROXY_COOKIE_DOMAINS: ${DOMAIN}
      OAUTH2_PROXY_WHITELIST_DOMAINS: ${DOMAIN}
      # Re-validate the session against Google every 1h so a revoked Google
      # account stops working within the hour, not at full cookie expiry.
      OAUTH2_PROXY_COOKIE_REFRESH: 1h
      # ── Email gate is now SINGLE-LAYER (stash side only) ─────────────────
      # Previous shape: oauth2-proxy read ``emails.txt`` as a hard
      # allow-list, refusing any Google account whose address wasn't
      # explicitly listed.  The intent was defense-in-depth ahead of
      # stash's tenant_members check, but in practice it broke the
      # in-app invite flow — an admin could create an invite for a
      # friend, but oauth2-proxy refused at the front door because
      # the friend's email wasn't in the static file.  Operators had
      # to SSH in + edit emails.txt + SIGHUP oauth2-proxy for every
      # invite, which doesn't scale.
      #
      # New shape: ``OAUTH2_PROXY_EMAIL_DOMAINS: *`` lets every
      # signed-in Google account through oauth2-proxy.  Stash's own
      # actor middleware (current_actor in app.py) is the sole
      # authorisation gate from here on — it checks tenant_members,
      # shares, and the /invite/<token> bypass, and 403s anyone who
      # doesn't match.  An invitee can now click the invite link,
      # sign in with any Google address, accept, and become a member
      # without any operator action between "create invite" and
      # "friend is in."
      #
      # If you want to RE-TIGHTEN this later (e.g. limit to specific
      # domains), set ``OAUTH2_PROXY_EMAIL_DOMAINS: example.com``
      # comma-separated.  Or restore the file-based allow-list by
      # uncommenting the lines below + the volume mount.
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      # OAUTH2_PROXY_AUTHENTICATED_EMAILS_FILE: /etc/oauth2-proxy/emails.txt
      # Skip-auth routes — paths that must reach stash *without* a
      # Google session cookie because the caller authenticates a
      # different way:
      # * ``^/api/v1/`` — bearer-token API for scripted clients (phase 11).
      # * ``^/mcp$``   — Model Context Protocol endpoint (phase 18); bearer.
      # * ``^/oauth/(token|register)$`` — server-to-server OAuth endpoints
      #   (phase 19).  /authorize is browser-driven and stays gated.
      # * ``^/\.well-known/oauth-`` — RFC 8414 + 9728 discovery; public.
      #   Both root + path-suffixed forms (``oauth-protected-resource/mcp``)
      #   match the prefix anchor, so a single regex covers both.
      # * ``^/healthz$`` — container liveness probe.
      # Each of these is also gated at the stash layer (current_actor
      # middleware) — this list just lets the request through the
      # outer Google-cookie wall.
      #
      # Env-var form requires COMMA separator — a YAML ``|-`` block
      # would be parsed as one giant regex with embedded newlines,
      # which is what bit a previous version of this file.
      # /about/ pages added — Stripe + similar KYC partners require
      # the business name, pricing, refund policy, sub-processor
      # list, etc. to be publicly reachable without a login.  These
      # also need a matching prefix in app.py's _AUTH_BYPASS_PREFIXES
      # so the stash actor middleware doesn't 403 them.
      # /static/ added so the public /about pages can fetch
      # /static/style.css without bouncing through Google login.
      # These assets carry no tenant data — just stash's own
      # CSS/JS/vendor bundles — so a public bypass is safe.
      # ``^/$`` is the public marketing landing — unauthenticated
      # visitors land here.  Authenticated dashboard moved to
      # ``/home`` so the bypass is targeted, not blanket.
      # Note on /robots.txt: oauth2-proxy hard-codes a handler
      # for the literal path ``/robots.txt`` that returns
      # ``User-agent: *\nDisallow: /``.  The path is a Go const
      # in their source, not an env-configurable setting.  We
      # work around it at the Caddy layer (Caddyfile rewrites
      # /robots.txt → /__stash_robots_txt before this proxy ever
      # sees the request).  The skip-auth regex below carries
      # the rewritten path so it forwards to stash without
      # auth; stash serves the actual friendly content.
      OAUTH2_PROXY_SKIP_AUTH_ROUTES: ^/$,^/__stash_robots_txt$,^/api/v1/,^/mcp$,^/oauth/token$,^/oauth/register$,^/\.well-known/oauth-,^/healthz$,^/about$,^/about/,^/static/,^/encircle-alternative$,^/webhooks/stripe$
      # API_ROUTES — endpoints that return 401 instead of redirecting
      # to /oauth2/sign_in when the session is missing/expired.  Polling
      # endpoints belong here.  Without this, a stale tab still running
      # /queue/state every few seconds triggers oauth2-proxy's sign-in
      # initiation each poll, which generates a NEW CSRF cookie that
      # overwrites the one for the user's actually-in-progress OAuth
      # flow in their other tab — the callback then 403s with
      # "CSRF token mismatch, potential attack" and the user can't sign
      # back in until every stale tab is closed.  Returning 401 lets
      # the polling JS detect logout cleanly without touching CSRF
      # state.
      OAUTH2_PROXY_API_ROUTES: ^/queue/state$,^/queue/items$,^/ingest/state$,^/ingest/jobs$,^/api/v1/tour/state$
      # Pass useful headers to stash (X-Forwarded-User / X-Forwarded-Email).
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      # Skip the "click to sign in" interstitial — go straight to Google.
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      # Default upstream timeout is 30s, which kills multi-hundred-MB backup
      # restores mid-stream with "context canceled". Bump generously — the
      # only long upload path is /maintenance/import, gated by Caddy's 2GB cap.
      OAUTH2_PROXY_UPSTREAM_TIMEOUT: 30m
    # emails.txt mount left commented for operators who want to
    # restore the hard file-based allow-list (see the long comment
    # above the OAUTH2_PROXY_EMAIL_DOMAINS line).
    # volumes:
    #   - ./emails.txt:/etc/oauth2-proxy/emails.txt:ro
    depends_on:
      - stash
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  stash:
    # STASH_IMAGE is REQUIRED — there is intentionally no ``:latest``
    # tag published.  Pin prod to a specific ``:vX.Y.Z`` so cutovers
    # are deliberate; pin staging to ``:dev`` so watchtower can
    # auto-pull the staging channel.  See ``.env.example`` for the
    # values to use in each environment.
    image: ${STASH_IMAGE:?STASH_IMAGE must be set — see deploy/.env.example for the prod vs staging values}
    container_name: stash
    restart: unless-stopped
    pull_policy: always
    env_file:
      - .env
    environment:
      # Used to build the URL encoded into printed-label QR codes.
      STASH_PUBLIC_URL: https://${DOMAIN}
      # Where the matching staging deployment lives.  Only used on
      # the PROD box — it lets the verification-loop kanban
      # render a 🧪 "open on staging" link that rewrites the
      # feedback row's source_url to the staging host.  Unset on
      # staging itself (the link is meaningless there).  See
      # CICD.md → "verification loop".
      STASH_STAGING_URL: ${STASH_STAGING_URL:-}
      WATCHTOWER_URL: http://watchtower:8080
      WATCHTOWER_TOKEN: ${WATCHTOWER_TOKEN}
      # Encryption at rest.  Required — stash refuses to boot without it.
      # Wraps every tenant's DEK; back the value up separately from the
      # data backups (see .env for generation + caveats).
      STASH_KEK: ${STASH_KEK}
      # Multi-tenancy gates. The proxy's emails.txt is the first layer; the
      # tenant_members table (seeded from STASH_BOOTSTRAP_MEMBER_EMAIL on
      # first migration, or the legacy STASH_ALLOWED_EMAILS fallback) is
      # the second.  Operators get /admin via STASH_OPERATOR_EMAILS but
      # cannot read tenant data through that route by design.
      STASH_BOOTSTRAP_MEMBER_EMAIL: ${STASH_BOOTSTRAP_MEMBER_EMAIL}
      STASH_OPERATOR_EMAILS: ${STASH_OPERATOR_EMAILS}
      STASH_ALLOWED_EMAILS: ${STASH_ALLOWED_EMAILS}
      # Off-site backup target (Backblaze B2, S3-compatible API).  When
      # unset the /admin "Upload to B2" button is hidden; the in-app
      # /usage/backup download still works.  See .env.example for the
      # generate-credentials walk-through and the hard rule about the
      # KEK living in a separate bucket from the data.
      B2_KEY_ID: ${B2_KEY_ID:-}
      B2_APPLICATION_KEY: ${B2_APPLICATION_KEY:-}
      B2_ENDPOINT: ${B2_ENDPOINT:-}
      B2_BUCKET: ${B2_BUCKET:-}
    volumes:
      - stash-data:/data
    networks:
      - backend
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  # Tightly-scoped proxy in front of /var/run/docker.sock. Watchtower talks
  # to this over a private network instead of mounting the socket directly,
  # so a watchtower compromise (or a 0-day in any image it pulls) doesn't
  # automatically equal root on the host. Only the API endpoints watchtower
  # actually needs are exposed.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: docker-socket-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1   # list / inspect / create / start / stop / restart
      IMAGES: 1       # list / inspect / pull
      NETWORKS: 1     # required so recreated containers rejoin the right nets
      POST: 1         # allow the POST verbs above
      DELETE: 1       # for WATCHTOWER_CLEANUP=true
      # Read-only metadata endpoints. Without these, the Docker client can't
      # negotiate an API version and falls back to 1.25 — newer daemons reject
      # that with "client version 1.25 is too old".
      PING: 1
      VERSION: 1
      # Not enabled: EXEC, VOLUMES, SWARM, SECRETS, SERVICES, TASKS, NODES,
      # CONFIGS, BUILD, COMMIT, INFO, AUTH, SESSION, SYSTEM, PLUGINS.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - docker-control
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    networks:
      - backend
      - docker-control
    environment:
      # Talk to the proxy, not the host's docker socket.
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      # Pin the Docker API version. Without this, the Docker client SDK in
      # watchtower defaults to v1.25 and modern dockerd rejects it with
      # "client version 1.25 is too old. Minimum supported API version is 1.40".
      # 1.45 ships with Docker 25+; bump if you run a newer daemon that drops it.
      DOCKER_API_VERSION: "1.45"
      # Only act on containers explicitly opted-in via the label above.
      WATCHTOWER_LABEL_ENABLE: "true"
      # Two update channels, both gated on the env values in .env so the
      # same compose file serves prod + staging without forking:
      #
      #   1. HTTP API ("Check for updates" on /admin/maintenance).
      #      Always on — operators get a manual cutover button.
      #
      #   2. Periodic poll (auto-pull on a timer).  Off for prod
      #      (cutover stays deliberate); on for staging (the whole
      #      point is "dev push → image lives on staging within
      #      minutes").
      #
      # Defaults below match prod (manual only).  Staging sets:
      #   WATCHTOWER_PERIODIC_POLLS=true
      #   WATCHTOWER_POLL_INTERVAL=300
      # in its .env to flip on the auto-pull loop.  See README.md.
      WATCHTOWER_HTTP_API_UPDATE: "true"
      WATCHTOWER_HTTP_API_PERIODIC_POLLS: ${WATCHTOWER_PERIODIC_POLLS:-false}
      WATCHTOWER_POLL_INTERVAL: ${WATCHTOWER_POLL_INTERVAL:-86400}
      WATCHTOWER_HTTP_API_TOKEN: ${WATCHTOWER_TOKEN}
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_RESTARTING: "true"
    # No docker.sock mount — talks to the proxy over the network instead.
    # If you push to a private GHCR image, mount a docker config with creds:
    # volumes:
    #   - ${HOME}/.docker/config.json:/config.json:ro

volumes:
  stash-data:
  caddy-data:
  caddy-config:

networks:
  # Public-facing leg: only caddy + oauth2-proxy live here. Caddy is the
  # only container with published ports.
  frontend:
  # Private leg: stash and watchtower are unreachable from the internet
  # AND from any future container that doesn't explicitly join `backend`.
  # oauth2-proxy bridges the two networks — it's the only path in.
  backend:
  # Even more private: only watchtower and docker-socket-proxy live here.
  # `internal: true` strips the network of internet routing entirely — the
  # proxy doesn't need it, and it shrinks blast-radius if either container
  # is ever compromised.
  docker-control:
    internal: true

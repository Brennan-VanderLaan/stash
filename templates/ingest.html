{% extends "base.html" %}
{% block title %}Ingest · Stash{% endblock %}
{% block content %}

<div class="card">
  <div class="card-title">Ingest a pile</div>
  <p class="text-sm text-muted mb-2">
    Snap a photo — Claude spots every item and queues them for sorting.
  </p>
  <div class="btn-row">
    <form method="post" action="/ingest" enctype="multipart/form-data" class="flex-1 ingest-upload">
      <label class="btn btn-primary btn-block">
        Take photo
        <input type="file" name="photos" accept="image/*" capture="environment" hidden data-auto-submit>
      </label>
    </form>
    <form method="post" action="/ingest" enctype="multipart/form-data" class="flex-1 ingest-upload">
      <label class="btn btn-secondary btn-block">
        Select from gallery
        <input type="file" name="photos" accept="image/*" multiple hidden data-auto-submit>
      </label>
    </form>
  </div>
</div>

<div id="ingest-jobs">
  {% include "_ingest_jobs.html" %}
</div>

<script>
(function() {
  // ── Auto-submit file pickers without nuking the page ─────────────
  // The forms set hidden=true on inputs and used onchange="this.form.submit()"
  // before. With the JS poller below we don't need the meta-refresh that
  // was eating in-progress selections.
  let uploading = false;
  document.querySelectorAll('[data-auto-submit]').forEach(input => {
    input.addEventListener('change', () => {
      if (input.files && input.files.length > 0) {
        uploading = true;
        input.form.submit();
      }
    });
  });

  // ── Poll for job-state changes, swap section in place ────────────
  // Fingerprint comes from the server-rendered initial state; we hit the
  // lightweight /ingest/state endpoint and only fetch the HTML fragment
  // when something actually changed. This means an idle page makes ~0
  // bytes/sec of network noise instead of a full page reload every 3 s.
  const jobsEl = document.getElementById('ingest-jobs');
  let fingerprint = {{ fingerprint | tojson }};

  async function tick() {
    if (uploading) return;  // never disturb an in-flight POST
    try {
      const r = await fetch('/ingest/state', { cache: 'no-store' });
      if (!r.ok) return;
      const data = await r.json();
      if (data.fingerprint !== fingerprint) {
        const html = await fetch('/ingest/jobs', { cache: 'no-store' });
        if (html.ok) {
          jobsEl.innerHTML = await html.text();
          fingerprint = data.fingerprint;
        }
      }
    } catch (e) {
      // Network blip — try again next tick.
    }
  }
  // Poll every 2.5 s while there's anything in flight; fall back to a slower
  // 8 s "is anyone home" beat once everything settles.
  let interval = setInterval(tick, 2500);
})();
</script>

{% endblock %}
